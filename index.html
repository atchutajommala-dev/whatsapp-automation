<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub | Management Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #141417;
            --bg-tertiary: #1c1c21;
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            background-color: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Main Content */
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .header-section {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-text h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header-text p {
            color: var(--text-secondary);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* Cards */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            flex: 1;
        }

        .card-status-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-success { background-color: var(--success); box-shadow: 0 0 10px var(--success); color: var(--success); }
        .status-error { background-color: var(--error); box-shadow: 0 0 10px var(--error); color: var(--error); }
        .status-idle { background-color: var(--text-secondary); color: var(--text-secondary); }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            background-color: var(--bg-primary);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8125rem;
        }

        .meta-label { color: var(--text-secondary); }
        .meta-value { font-weight: 500; }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: auto;
        }

        button {
            padding: 0.625rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
            flex: 1;
        }

        .btn-primary:hover { background-color: var(--accent-secondary); }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background-color: #27272a; }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover { background-color: var(--error); color: white; }

        /* Log Section */
        .logs-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
        }

        .logs-header {
            padding: 1rem 1.5rem;
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-container {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.25rem;
            display: flex;
            gap: 1rem;
        }

        .log-entry:hover { background-color: rgba(255, 255, 255, 0.02); }

        .log-time { color: var(--text-secondary); min-width: 140px; }
        .log-name { color: var(--accent-primary); font-weight: 600; min-width: 140px; }
        .log-status { font-weight: 600; min-width: 70px; }
        .log-msg { color: var(--text-primary); flex: 1; white-space: pre-wrap; word-break: break-all; }

        .log-status.success { color: var(--success); }
        .log-status.error { color: var(--error); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 500px;
        }

        .modal h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); }
        
        input, select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: white;
            outline: none;
            font-size: 0.875rem;
        }

        input:focus { border-color: var(--accent-primary); }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Loader */
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Auth Overlay (Same as before) -->
    <div id="auth-overlay">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); padding: 3rem; border-radius: 1.5rem; text-align: center; max-width: 400px; width: 90%;">
            <h2 style="margin-bottom: 2rem;">Secure Access</h2>
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">Access Key</label>
                <input type="password" id="access-key" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%; font-size: 1rem; padding: 0.8rem;" onclick="checkAuth()">
                Unlock Dashboard
            </button>
            <p id="auth-error" style="color: var(--error); font-size: 0.875rem; margin-top: 1rem; display: none;">Invalid access key.</p>
        </div>
    </div>

    <!-- Add Automation Modal -->
    <div id="add-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Add Automation</h2>
            <form id="add-form" onsubmit="submitAdd(event)">
                <div class="form-group">
                    <label>Automation Name</label>
                    <input type="text" id="add-name" placeholder="e.g. Weekly Performance" required>
                </div>
                <div class="form-group">
                    <label>Script File</label>
                    <select id="add-script" required>
                        <option value="apr-26_performance.py">apr-26_performance.py</option>
                        <option value="overall_manish.py">overall_manish.py</option>
                        <option value="gew_whatsapp.py">gew_whatsapp.py</option>
                        <option value="new_biz_cat_whatsapp.py">new_biz_cat_whatsapp.py</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sheet ID (Direct or Env Var Name)</label>
                    <input type="text" id="add-sheet" placeholder="e.g. OVERALL_SHEET_ID" required>
                </div>
                <div class="form-group">
                    <label>Destinations (Comma separated numbers)</label>
                    <input type="text" id="add-dest" placeholder="e.g. 916303054457,..." required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="toggleModal('add-modal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Automation</button>
                </div>
            </form>
        </div>
    </div>

    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
            Automation Hub
        </div>
        <div class="user-info">
            <span class="status-pill">System Online</span>
            <button class="btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        <div class="header-section">
            <div class="header-text">
                <h1>Workflow Management</h1>
                <p>Manage, trigger, and parameterize your WhatsApp automations.</p>
            </div>
            <button class="btn-primary" style="flex: initial; padding: 0.75rem 1.5rem;" onclick="toggleModal('add-modal')">
                + Add Automation
            </button>
        </div>

        <div class="grid" id="automation-grid">
            <!-- Cards will be injected here -->
        </div>

        <div class="header-section">
            <div class="header-text">
                <h2>Execution History</h2>
                <p>Real-time audit trail from Vercel KV logs.</p>
            </div>
            <button class="btn-secondary" onclick="refreshData()">
                Refresh Logs
            </button>
        </div>

        <div class="logs-section">
            <div class="logs-header">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="loader" id="log-loader"></div>
                    <span style="font-weight: 600;">System Logs</span>
                </div>
                <span id="log-count" style="font-size: 0.75rem; color: var(--text-secondary)">Showing last 50 entries</span>
            </div>
            <div class="logs-container" id="logs-container">
                <!-- Logs will be injected here -->
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let automations = [];
        
        function checkAuth() {
            const key = document.getElementById('access-key').value;
            if (key) {
                localStorage.setItem('auth_key', key);
                document.getElementById('auth-overlay').classList.add('hidden');
                refreshData();
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        if (localStorage.getItem('auth_key')) {
            document.getElementById('auth-overlay').classList.add('hidden');
            setTimeout(refreshData, 100);
        }

        function logout() {
            localStorage.removeItem('auth_key');
            location.reload();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        async function refreshData() {
            document.getElementById('log-loader').classList.remove('hidden');
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                const data = await response.json();
                
                automations = data.automations;
                renderCards(data.statuses);
                renderLogs(data.activity);
            } catch (err) {
                console.error('Failed to fetch data', err);
            } finally {
                document.getElementById('log-loader').classList.add('hidden');
            }
        }

        function renderCards(statuses) {
            const grid = document.getElementById('automation-grid');
            grid.innerHTML = automations.map(auto => {
                const status = statuses[auto.name] ? (typeof statuses[auto.name] === 'string' ? JSON.parse(statuses[auto.name]) : statuses[auto.name]) : null;
                const statusClass = status ? (status.status === 'success' ? 'status-success' : 'status-error') : 'status-idle';
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">${auto.name}</div>
                            <div class="card-status-wrapper">
                                <span class="card-status ${statusClass}"></span>
                                <span class="${statusClass}">${status ? status.status : 'Idle'}</span>
                            </div>
                        </div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <span class="meta-label">Script</span>
                                <span class="meta-value">${auto.script}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Sheet ID</span>
                                <span class="meta-value">${auto.sheet_id.substring(0, 15)}...</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Last Duration</span>
                                <span class="meta-value">${status ? status.duration + 's' : '--'}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-primary" onclick="runNow('${auto.id}', '${auto.name}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Trigger
                            </button>
                            <button class="btn-danger" style="flex: initial;" onclick="deleteAuto('${auto.id}', '${auto.name}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLogs(activity) {
            const container = document.getElementById('logs-container');
            if (!activity || activity.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">No execution history.</div>';
                return;
            }
            
            container.innerHTML = activity.map(log => {
                const entry = typeof log === 'string' ? JSON.parse(log) : log;
                return `
                    <div class="log-entry">
                        <span class="log-time">[${new Date(entry.timestamp).toLocaleString()}]</span>
                        <span class="log-name">${entry.name}</span>
                        <span class="log-status ${entry.status}">${entry.status.toUpperCase()}</span>
                        <span class="log-msg">${entry.message}</span>
                    </div>
                `;
            }).join('');
        }

        async function submitAdd(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('add-name').value,
                script: document.getElementById('add-script').value,
                sheet_id: document.getElementById('add-sheet').value,
                destinations: document.getElementById('add-dest').value
            };

            try {
                const res = await fetch(`${API_BASE}/dashboard`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    toggleModal('add-modal');
                    document.getElementById('add-form').reset();
                    refreshData();
                }
            } catch (err) {
                alert('Failed to save automation');
            }
        }

        async function deleteAuto(id, name) {
            if (!confirm(`Permanently delete "${name}"? This will also clear its history.`)) return;
            try {
                const res = await fetch(`${API_BASE}/dashboard?id=${id}`, { method: 'DELETE' });
                if (res.ok) refreshData();
            } catch (err) {
                alert('Delete failed');
            }
        }

        async function runNow(id, name) {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div> Running...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/run?id=${id}`);
                const result = await res.text();
                alert(result);
                refreshData();
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        setInterval(refreshData, 30000);
    </script>
</body>
</html>
