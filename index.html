<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub | Master Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #141417;
            --bg-tertiary: #1c1c21;
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        nav { background-color: var(--bg-secondary); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.25rem; font-weight: 700; background: linear-gradient(to right, var(--accent-primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem; }
        .status-pill { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; background-color: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        main { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; }
        .header-section { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .header-text h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .card { background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; transition: all 0.3s ease; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent-primary); transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
        .card-title { font-size: 1.125rem; font-weight: 600; flex: 1; }
        .card-status-wrapper { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .card-status { width: 8px; height: 8px; border-radius: 50%; }
        .status-success { background-color: var(--success); box-shadow: 0 0 10px var(--success); color: var(--success); }
        .status-error { background-color: var(--error); box-shadow: 0 0 10px var(--error); color: var(--error); }
        .status-idle { background-color: var(--text-secondary); color: var(--text-secondary); }
        .card-meta { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; background-color: var(--bg-primary); padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border); }
        .meta-item { display: flex; justify-content: space-between; font-size: 0.8125rem; }
        .meta-label { color: var(--text-secondary); }
        .meta-value { font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 180px; }
        .meta-value.mono { font-family: 'JetBrains Mono', monospace; color: var(--accent-primary); }
        .card-actions { display: flex; gap: 0.75rem; margin-top: auto; }
        button { padding: 0.625rem 1rem; border-radius: 0.5rem; font-size: 0.8125rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary { background-color: var(--accent-primary); color: white; flex: 1; }
        .btn-secondary { background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }
        .logs-section { background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; }
        .logs-header { padding: 1rem 1.5rem; background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logs-container { height: 400px; overflow-y: auto; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; line-height: 1.6; }
        .log-entry { margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 0.25rem; display: flex; gap: 1rem; }
        .log-time { color: var(--text-secondary); min-width: 140px; }
        .log-name { color: var(--accent-primary); font-weight: 600; min-width: 140px; }
        .log-status { font-weight: 600; min-width: 70px; }
        .log-status.success { color: var(--success); }
        .log-status.error { color: var(--error); }
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .modal { background-color: var(--bg-secondary); border: 1px solid var(--border); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 500px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; padding: 0.75rem; background-color: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 0.5rem; color: white; outline: none; font-size: 0.875rem; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        #auth-overlay { position: fixed; inset: 0; background-color: var(--bg-primary); z-index: 2000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); padding: 3rem; border-radius: 1.5rem; text-align: center; max-width: 400px; width: 90%;">
            <h2 style="margin-bottom: 2rem;">Secure Access</h2>
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">Access Key</label>
                <input type="password" id="access-key" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%; font-size: 1rem; padding: 0.8rem;" onclick="checkAuth()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>New Master Automation</h2>
            <form id="add-form" onsubmit="submitAdd(event)">
                <div class="form-group"><label>Name</label><input type="text" id="add-name" placeholder="e.g. Daily Overall" required></div>
                <div class="form-group"><label>Sheet ID</label><input type="text" id="add-sheet-id" placeholder="Google Sheet ID" required></div>
                <div class="form-group"><label>Sheet Name</label><input type="text" id="add-sheet-name" placeholder="e.g. Whatsapp SS" required></div>
                <div class="form-group"><label>Ranges (Comma separated)</label><input type="text" id="add-ranges" placeholder="e.g. A1:M20, A25:Z50" required></div>
                <div class="form-group"><label>Destinations</label><input type="text" id="add-dest" placeholder="91..., 91..." required></div>
                <div class="form-group"><label>Cron Schedule</label><input type="text" id="add-cron" placeholder="0 10 * * *" required></div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="toggleModal('add-modal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Configuration</button>
                </div>
            </form>
        </div>
    </div>

    <nav>
        <div class="logo">Automation Hub</div>
        <div class="user-info"><span class="status-pill">Master Script Online</span><button class="btn-secondary" onclick="logout()">Logout</button></div>
    </nav>

    <main>
        <div class="header-section">
            <div class="header-text"><h1>Master Control</h1><p>Dynamic workflows powered by one script.</p></div>
            <button class="btn-primary" style="flex: initial; padding: 0.75rem 1.5rem;" onclick="toggleModal('add-modal')">+ Add Automation</button>
        </div>
        <div class="grid" id="automation-grid"></div>
        <div class="header-section">
            <div class="header-text"><h2>Run Logs</h2><p>Audit trail from Vercel KV.</p></div>
            <button class="btn-secondary" onclick="refreshData()">Refresh</button>
        </div>
        <div class="logs-section">
            <div class="logs-header"><div class="loader" id="log-loader"></div><span>System Audit</span></div>
            <div class="logs-container" id="logs-container"></div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        function checkAuth() { if (document.getElementById('access-key').value) { localStorage.setItem('auth_key', 'ok'); document.getElementById('auth-overlay').classList.add('hidden'); refreshData(); } }
        if (localStorage.getItem('auth_key')) { document.getElementById('auth-overlay').classList.add('hidden'); setTimeout(refreshData, 100); }
        function logout() { localStorage.removeItem('auth_key'); location.reload(); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        async function refreshData() {
            document.getElementById('log-loader').classList.remove('hidden');
            try {
                const res = await fetch(`${API_BASE}/dashboard`);
                const data = await res.json();
                renderCards(data.automations, data.statuses);
                renderLogs(data.activity);
            } catch (err) { console.error(err); } finally { document.getElementById('log-loader').classList.add('hidden'); }
        }

        function renderCards(autos, statuses) {
            document.getElementById('automation-grid').innerHTML = autos.map(auto => {
                const status = statuses[auto.name] ? (typeof statuses[auto.name] === 'string' ? JSON.parse(statuses[auto.name]) : statuses[auto.name]) : null;
                const sClass = status ? (status.status === 'success' ? 'status-success' : 'status-error') : 'status-idle';
                return `
                    <div class="card">
                        <div class="card-header"><div class="card-title">${auto.name}</div><div class="card-status-wrapper"><span class="card-status ${sClass}"></span><span>${status ? status.status : 'Idle'}</span></div></div>
                        <div class="card-meta">
                            <div class="meta-item"><span class="meta-label">Cron</span><span class="meta-value mono">${auto.cron}</span></div>
                            <div class="meta-item"><span class="meta-label">Sheet</span><span class="meta-value">${auto.sheet_name}</span></div>
                            <div class="meta-item"><span class="meta-label">Ranges</span><span class="meta-value">${auto.ranges}</span></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-primary" onclick="runNow('${auto.id}', '${auto.name}')">Trigger</button>
                            <button class="btn-danger" style="flex: initial;" onclick="deleteAuto('${auto.id}', '${auto.name}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLogs(activity) {
            document.getElementById('logs-container').innerHTML = activity.map(log => {
                const entry = typeof log === 'string' ? JSON.parse(log) : log;
                return `<div class="log-entry"><span class="log-time">[${new Date(entry.timestamp).toLocaleString()}]</span><span class="log-name">${entry.name}</span><span class="log-status ${entry.status}">${entry.status.toUpperCase()}</span><span class="log-msg">${entry.message}</span></div>`;
            }).join('');
        }

        async function submitAdd(e) {
            e.preventDefault();
            const data = {
                id: document.getElementById('add-name').value.toLowerCase().replace(/ /g, '_'),
                name: document.getElementById('add-name').value,
                sheet_id: document.getElementById('add-sheet-id').value,
                sheet_name: document.getElementById('add-sheet-name').value,
                ranges: document.getElementById('add-ranges').value,
                destinations: document.getElementById('add-dest').value,
                cron: document.getElementById('add-cron').value
            };
            await fetch(`${API_BASE}/dashboard`, { method: 'POST', body: JSON.stringify(data) });
            toggleModal('add-modal'); refreshData();
        }

        async function deleteAuto(id, name) { if (confirm(`Delete ${name}?`)) { await fetch(`${API_BASE}/dashboard?id=${id}`, { method: 'DELETE' }); refreshData(); } }
        async function runNow(id, name) {
            const btn = event.currentTarget; btn.disabled = true; btn.innerText = 'Running...';
            try { const res = await fetch(`${API_BASE}/run?id=${id}`); alert(await res.text()); refreshData(); }
            finally { btn.disabled = false; btn.innerText = 'Trigger'; }
        }
    </script>
</body>
</html>
