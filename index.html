<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub | Management Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #141417;
            --bg-tertiary: #1c1c21;
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            background-color: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Main Content */
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .header-section {
            margin-bottom: 2rem;
        }

        .header-section h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header-section p {
            color: var(--text-secondary);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* Cards */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .card-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
            display: inline-block;
        }

        .status-success { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-error { background-color: var(--error); box-shadow: 0 0 10px var(--error); }
        .status-idle { background-color: var(--text-secondary); }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .meta-label { color: var(--text-secondary); }
        .meta-value { font-weight: 500; }

        .card-actions {
            display: flex;
            gap: 1rem;
        }

        button {
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-secondary);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: #27272a;
        }

        /* Log Section */
        .logs-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
        }

        .logs-header {
            padding: 1rem 1.5rem;
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-container {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.25rem;
            display: flex;
            gap: 1rem;
        }

        .log-entry:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .log-time { color: var(--text-secondary); min-width: 150px; }
        .log-name { color: var(--accent-primary); font-weight: 600; min-width: 150px; }
        .log-status { font-weight: 600; min-width: 80px; }
        .log-msg { color: var(--text-primary); flex: 1; }

        .log-status.success { color: var(--success); }
        .log-status.error { color: var(--error); }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--bg-primary);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 { margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); }
        input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--accent-primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Access Restricted</h2>
            <div class="input-group">
                <label>Access Key</label>
                <input type="password" id="access-key" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="checkAuth()">
                Unlock Dashboard
            </button>
            <p id="auth-error" style="color: var(--error); font-size: 0.875rem; margin-top: 1rem; display: none;">Invalid access key.</p>
        </div>
    </div>

    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
            Automation Hub
        </div>
        <div class="user-info">
            <span class="status-pill">System Online</span>
            <button class="btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        <div class="header-section">
            <h1>Workflow Management</h1>
            <p>Monitor, manage, and manually trigger your WhatsApp automation workflows.</p>
        </div>

        <div class="grid" id="automation-grid">
            <!-- Cards will be injected here -->
        </div>

        <div class="header-section">
            <h2>Execution History</h2>
            <p>Real-time audit trail of all automation runs.</p>
        </div>

        <div class="logs-section">
            <div class="logs-header">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="loader" id="log-loader"></div>
                    <span style="font-weight: 600;">System Logs</span>
                </div>
                <button class="btn-secondary" style="padding: 0.4rem 0.8rem;" onclick="refreshData()">Refresh</button>
            </div>
            <div class="logs-container" id="logs-container">
                <!-- Logs will be injected here -->
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let automations = [];
        
        // Simple Auth Logic
        function checkAuth() {
            const key = document.getElementById('access-key').value;
            // In a real app, this would be a hash check or server-side session
            // For now, we'll compare against an env var value (passed to client or checked via API)
            // For simplicity in this demo, let's assume 'admin123' or similar
            if (key) {
                localStorage.setItem('auth_key', key);
                document.getElementById('auth-overlay').classList.add('hidden');
                refreshData();
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        if (localStorage.getItem('auth_key')) {
            document.getElementById('auth-overlay').classList.add('hidden');
            setTimeout(refreshData, 100);
        }

        function logout() {
            localStorage.removeItem('auth_key');
            location.reload();
        }

        async function refreshData() {
            document.getElementById('log-loader').classList.remove('hidden');
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                const data = await response.json();
                
                automations = data.automations;
                renderCards(data.statuses);
                renderLogs(data.activity);
            } catch (err) {
                console.error('Failed to fetch data', err);
            } finally {
                document.getElementById('log-loader').classList.add('hidden');
            }
        }

        function renderCards(statuses) {
            const grid = document.getElementById('automation-grid');
            grid.innerHTML = automations.map(auto => {
                const status = statuses[auto.name] ? JSON.parse(statuses[auto.name]) : null;
                const statusClass = status ? (status.status === 'success' ? 'status-success' : 'status-error') : 'status-idle';
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">${auto.name}</div>
                            <div style="display: flex; align-items: center;">
                                <span class="card-status ${statusClass}"></span>
                                <span style="font-size: 0.75rem; color: var(--text-secondary)">${status ? status.status.toUpperCase() : 'NEVER RUN'}</span>
                            </div>
                        </div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <span class="meta-label">Last Run</span>
                                <span class="meta-value">${status ? formatTime(status.timestamp) : 'N/A'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Duration</span>
                                <span class="meta-value">${status ? status.duration + 's' : 'N/A'}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-primary" onclick="runNow('${auto.endpoint}', '${auto.name}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Run Now
                            </button>
                            <button class="btn-secondary" onclick="viewLogs('${auto.name}')">Logs</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLogs(activity) {
            const container = document.getElementById('logs-container');
            if (!activity || activity.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">No logs available.</div>';
                return;
            }
            
            container.innerHTML = activity.map(log => {
                const entry = typeof log === 'string' ? JSON.parse(log) : log;
                return `
                    <div class="log-entry">
                        <span class="log-time">[${new Date(entry.timestamp).toLocaleString()}]</span>
                        <span class="log-name">${entry.name}</span>
                        <span class="log-status ${entry.status}">${entry.status.toUpperCase()}</span>
                        <span class="log-msg">${entry.message}</span>
                    </div>
                `;
            }).join('');
        }

        async function runNow(endpoint, name) {
            if (!confirm(`Trigger ${name} manually?`)) return;
            
            // Show loading state or similar
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div> Running...';
            btn.disabled = true;

            try {
                const res = await fetch(endpoint);
                const result = await res.text();
                alert(result);
                refreshData();
            } catch (err) {
                alert(`Failed to run automation: ${err.message}`);
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function formatTime(iso) {
            const date = new Date(iso);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
